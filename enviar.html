<!DOCTYPE html>
<html>
<head>
  <title>Divulgar Grupo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📢 Divulgar Grupo</h2>

<input id="nome" placeholder="Nome do grupo"><br><br>
<input id="descricao" placeholder="Descrição"><br><br>
<input id="link" placeholder="Link WhatsApp"><br><br>

<h3>💰 Plano VIP</h3>

<select id="vip">
  <option value="0">Grátis</option>
  <option value="1">1 dia - R$2,50</option>
  <option value="2">2 dias - R$5,00</option>
  <option value="3">3 dias - R$8,00</option>
  <option value="4">4 dias - R$11,50</option>
  <option value="5">5 dias - R$15,00</option>
</select>

<br><br>

<button onclick="copiarPix()">📋 Copiar Pix</button>
<button onclick="abrirWhats()">💬 Enviar Comprovante</button>

<script>
function copiarPix() {
  const pix = "16267385728";
  navigator.clipboard.writeText(pix);
  alert("Pix copiado!");
}

function abrirWhats() {
  const nome = document.getElementById("nome").value;
  const plano = document.getElementById("vip").value;

  const msg = `Olá, paguei o VIP\nGrupo: ${nome}\nPlano: ${plano} dias\nSegue comprovante:`;

  const numero = "5521990682259";

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
